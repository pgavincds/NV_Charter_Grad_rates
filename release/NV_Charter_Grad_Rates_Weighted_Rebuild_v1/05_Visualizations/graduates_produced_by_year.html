<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Graduates Produced By Year</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #f5f1e8;
      color: #1f2a2e;
      margin: 0;
      padding: 2rem;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }
    .note {
      color: #4a5d63;
      margin: 0 0 1rem 0;
    }
    #chart {
      width: 100%;
      height: 720px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Graduates Produced By Year</h1>
    <p class="note">This is a core policy chart: it shows how many students actually graduated, not just whether rates rose or fell. Public presentation begins in 2014-15.</p>
    <div id="chart"></div>
  </div>
  <script>
    const payload = {"traces": [{"type": "bar", "name": "Clark Charter Total", "x": ["2014-15", "2015-16", "2016-17", "2017-18", "2018-19", "2019-20", "2020-21", "2021-22", "2022-23", "2023-24", "2024-25"], "y": [293, 319, 454, 498, 510, 561, 598, 569, 668, 639, 825], "marker": {"color": "#2a6fdb"}, "hovertemplate": "%{x}<br>%{y:,}<extra>Clark Charter Total</extra>"}, {"type": "bar", "name": "SPCSA Charter Only", "x": ["2014-15", "2015-16", "2016-17", "2017-18", "2018-19", "2019-20", "2020-21", "2021-22", "2022-23", "2023-24", "2024-25"], "y": [498, 547, 679, 1223, 1306, 1528, 1791, 2046, 2218, 2738, 2928], "marker": {"color": "#0f5c63"}, "hovertemplate": "%{x}<br>%{y:,}<extra>SPCSA Charter Only</extra>"}, {"type": "bar", "name": "Washoe Charter Total", "x": ["2014-15", "2015-16", "2016-17", "2017-18", "2018-19", "2019-20", "2020-21", "2021-22", "2022-23", "2023-24", "2024-25"], "y": [102, 108, 110, 89, 110, 112, 110, 149, 128, 152, 162], "marker": {"color": "#a05a00"}, "hovertemplate": "%{x}<br>%{y:,}<extra>Washoe Charter Total</extra>"}], "layout": {"barmode": "group", "paper_bgcolor": "#f5f1e8", "plot_bgcolor": "#fffaf2", "xaxis": {"title": "Graduating Class Year"}, "yaxis": {"title": "Graduates"}}};
    Plotly.newPlot("chart", payload.traces, payload.layout, {responsive: true, displayModeBar: true});
  </script>
</body>
</html>
