<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Top Contributors By Year</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #f5f1e8;
      color: #1f2a2e;
      margin: 0;
      padding: 2rem;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }
    .note {
      color: #4a5d63;
      margin: 0 0 1rem 0;
    }
    #chart {
      width: 100%;
      height: 720px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Top Contributors By Year</h1>
    <p class="note">These are the schools producing the largest numbers of graduates in selected years. The policy story is not only about rates; it is also about who actually produced graduating students.</p>
    <div id="chart"></div>
  </div>
  <script>
    const payload = {"traces": [{"type": "bar", "orientation": "h", "name": "2013-14", "x": [700.0, 209.0, 201.0, 166.0, 152.0, 69.0, 65.0, 38.0, 34.0, 28.0], "y": ["Nevada Virtual Charter", "Beacon Acad", "Odyssey Charter High School", "Nevada Connections Acad", "NSHS Legacy Single-Campus", "Alpine Acad", "Argent Preparatory Academy", "Academy of Career Education Charter School", "Coral Academy Charter School Secondary", "ICDA Charter HS"], "hovertemplate": "%{y}<br>Graduates: %{x:,}<extra>2013-14</extra>"}, {"type": "bar", "orientation": "h", "name": "2018-19", "x": [386.0, 274.0, 224.0, 145.0, 110.0, 107.0, 90.0, 72.0, 68.0, 66.0], "y": ["Odyssey Charter High School", "Nevada Connections Academy", "Nevada Virtual Academy", "Nevada State High School Henderson", "Nevada State High School Summerlin", "Somerset Academy Sky Pointe", "Coral Academy of Science Las Vegas Sandy Ridge", "Delta Academy", "Beacon Academy of Nevada", "Somerset Academy Losee"], "hovertemplate": "%{y}<br>Graduates: %{x:,}<extra>2018-19</extra>"}, {"type": "bar", "orientation": "h", "name": "2024-25", "x": [445.0, 332.0, 279.0, 236.0, 215.0, 209.0, 188.0, 181.0, 168.0, 155.0], "y": ["Odyssey Charter Schools 9-12 High School", "The Delta Academy JR/SR High School", "Nevada Virtual Charter School", "Nevada Connections Academy", "Doral Academy Red Rock", "Mater Academy East", "Somerset Academy Losee", "Somerset Academy Sky Pointe", "Coral Academy Sandy Ridge", "Pinecrest Academy of Nevada Cadence"], "hovertemplate": "%{y}<br>Graduates: %{x:,}<extra>2024-25</extra>"}], "layout": {"barmode": "group", "paper_bgcolor": "#f5f1e8", "plot_bgcolor": "#fffaf2", "xaxis": {"title": "Graduates"}, "yaxis": {"title": "School"}}};
    Plotly.newPlot("chart", payload.traces, payload.layout, {responsive: true, displayModeBar: true});
  </script>
</body>
</html>
